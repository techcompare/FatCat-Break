name: Compose GenUI CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: gradle

    - name: Grant execute permission for gradlew (if exists)
      run: if [ -f gradlew ]; then chmod +x gradlew; fi

    - name: Build with Gradle
      run: |
        if [ -f gradlew ]; then
          ./gradlew build
        else
          echo "No Gradle wrapper found yet. Skipping build step until Android project is fully initialized."
        fi
