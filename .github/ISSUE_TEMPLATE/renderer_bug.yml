name: "🎨 Jetpack Compose Renderer Bug"
description: "The JSON parsed correctly into UiNode, but GenerativeRenderer failed to draw it or crashed."
title: "[Renderer Bug]: "
labels: ["bug", "renderer", "compose"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a rendering bug! This helps us improve how the `UiNode` tree is translated into native `GenerativeRenderer` UI.
  - type: textarea
    id: uinode-structure
    attributes:
      label: "The JSON / UiNode Structure"
      description: "Provide the JSON that caused the UI bug."
      render: json
    validations:
      required: true
  - type: textarea
    id: expected-vs-actual
    attributes:
      label: "Expected vs. Actual Behavior"
      description: "What did you expect to see on the screen, and what actually happened?"
    validations:
      required: true
  - type: textarea
    id: error-logs
    attributes:
      label: "Crash Log / Stack Trace (if any)"
      render: shell
    validations:
      required: false
  - type: input
    id: compose-version
    attributes:
      label: "Jetpack Compose Version"
      placeholder: "e.g., 1.6.0"
    validations:
      required: true
