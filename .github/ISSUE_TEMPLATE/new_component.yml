name: "🧩 New UI Component Request"
description: "Suggest a new Jetpack Compose component (e.g., Slider, Switch) for the schema."
title: "[Component Request]: "
labels: ["enhancement", "new-component"]
body:
  - type: markdown
    attributes:
      value: |
        Want a new UI component added to the `UiNode` schema and `GenerativeRenderer`? Let us know!
  - type: input
    id: component-name
    attributes:
      label: "Component Name"
      placeholder: "e.g., Slider, DropdownMenu, LottieAnimation"
    validations:
      required: true
  - type: textarea
    id: proposed-schema
    attributes:
      label: "Proposed JSON Schema"
      description: "How should the LLM output this component in JSON?"
      value: |
        {
          "type": "YourComponent",
          "props": {
            // Your proposed properties here
          }
        }
      render: json
    validations:
      required: true
